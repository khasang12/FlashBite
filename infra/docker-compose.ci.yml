name: flashbite-ci

# Lightweight infra for CI: only the services the current test suite needs
# (Postgres for the event store/outbox, Redpanda for the outbox-poller round-trip).
# Redis Cluster / Mongo / Temporal are added here as later phases add tests that need them.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashbite
      POSTGRES_PASSWORD: local_dev_only_change_me
      POSTGRES_DB: flashbite_write
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashbite -d flashbite_write"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "18081:18081"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30
