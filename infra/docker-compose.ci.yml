name: flashbite-ci

# Infra for CI — the services the test suite needs:
# Postgres (event store/outbox), Redpanda (Kafka), MongoDB (read models),
# Redis Cluster (read-api cache), Temporal (saga orchestration).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashbite
      POSTGRES_PASSWORD: local_dev_only_change_me
      POSTGRES_DB: flashbite_write
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashbite -d flashbite_write"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "18081:18081"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-cluster:
    image: grokzen/redis-cluster:7.0.15
    environment:
      IP: 0.0.0.0
      INITIAL_PORT: 7100
      MASTERS: 3
      SLAVES_PER_MASTER: 1
    ports:
      - "7100-7105:7100-7105"
      - "17100-17105:17100-17105"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7100 cluster info | grep -q cluster_state:ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=temporal-postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
